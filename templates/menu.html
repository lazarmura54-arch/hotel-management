{% extends "base.html" %} {% block content %}

<h3 class="mb-4">{{ hotel.name }} Menu</h3>

<div class="row">
  {% for item in items %}
  <div class="col-lg-3 col-md-4 col-sm-6 col-12 mb-3">
    <div class="card">
      <img src="{{ url_for('static', filename='images/' + item.image) }}" />

      <div class="card-body">
        <h5>{{ item.name }}</h5>

        <p style="color: #f4c150">⭐ {{ item.rating }} • 20 min</p>

        <h6 class="text-success">₹{{ item.price }}</h6>

        <a href="/add_to_cart/{{ item.id }}" class="btn btn-custom w-100 mt-2">
          Add to Cart
        </a>
      </div>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
