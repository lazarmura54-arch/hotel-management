<!doctype html>
<html>
  <head>
    <title>LAZAR</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      /* Navbar */
      .navbar-custom {
        background: linear-gradient(45deg, orange, pink);
        color: white;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .menu-btn {
        font-size: 24px;
        cursor: pointer;
        border: 2px solid white;
        padding: 5px 10px;
        border-radius: 8px;
      }

      /* Sidebar */
      .sidebar {
        position: fixed;
        top: 0;
        right: -250px;
        width: 250px;
        height: 100%;
        background: linear-gradient(45deg, orange, pink);
        transition: 0.3s;
        padding-top: 60px;
        z-index: 1000;
      }

      .sidebar a {
        display: block;
        padding: 15px;
        color: white;
        font-size: 18px;
        text-decoration: none;
      }

      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Overlay */
      .overlay {
        position: fixed;
        display: none;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 999;
      }

      .overlay.active {
        display: block;
      }

      /* Floating Cart */
      .floating-cart {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff6600;
        color: white;
        padding: 14px 18px;
        border-radius: 50px;
        font-size: 18px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        z-index: 9999;
      }

      @media (max-width: 768px) {
        .floating-cart {
          bottom: 15px;
          right: 15px;
          padding: 12px 14px;
          font-size: 16px;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar-custom">
      <div>🍔 LOCAL</div>
      <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <a href="/">🏠 Home</a>

      {% if 'user_id' in session %}
      <a href="/profile">👤 Profile</a>
      <a href="/orders">📦 Orders</a>
      <a href="/cart">🛒 Cart</a>
      <a href="/logout">🚪 Logout</a>
      {% else %}
      <a href="/login">🔑 Login</a>
      <a href="/signup">📝 Signup</a>
      {% endif %}
    </div>

    <!-- OVERLAY -->
    <div id="overlay" class="overlay" onclick="toggleMenu()"></div>

    <!-- CONTENT -->
    <div class="container mt-4">{% block content %}{% endblock %}</div>

    <!-- FLOATING CART -->
    {% if session.get('cart') %}
    <a href="/cart" class="floating-cart"> 🛒 {{ session['cart']|length }} </a>
    {% endif %}

    <!-- SCRIPT -->
    <script>
      function toggleMenu() {
        let sidebar = document.getElementById("sidebar");
        let overlay = document.getElementById("overlay");

        if (sidebar.style.right === "0px") {
          sidebar.style.right = "-250px";
          overlay.classList.remove("active");
        } else {
          sidebar.style.right = "0px";
          overlay.classList.add("active");
        }
      }
    </script>
  </body>
</html>
