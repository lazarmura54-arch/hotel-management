<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCAL 🍔</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f5f5;
      }

      /* 🔥 NAVBAR */
      .navbar {
        background: linear-gradient(90deg, orange, pink);
        padding: 12px;
        color: white;
      }

      .menu-btn {
        font-size: 24px;
        cursor: pointer;
        border: 2px solid white;
        padding: 6px 10px;
        border-radius: 8px;
      }

      /* 🔥 SIDE MENU */
      .sidebar {
        position: fixed;
        top: 0;
        right: -250px;
        width: 250px;
        height: 100%;
        background: linear-gradient(orange, pink);
        padding: 20px;
        transition: 0.3s;
        z-index: 1000;
      }

      .sidebar a {
        display: block;
        color: white;
        margin: 15px 0;
        text-decoration: none;
        font-size: 18px;
      }

      .sidebar.active {
        right: 0;
      }

      /* 🔥 CARDS */
      .card {
        border-radius: 12px;
        overflow: hidden;
        padding: 8px;
        height: 100%;
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.05);
      }

      .card img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 10px;
      }

      .btn-custom {
        background: orange;
        color: white;
        border: none;
      }

      /* 🔥 FLOATING CART */
      .cart-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: orange;
        color: white;
        padding: 12px 18px;
        border-radius: 50px;
        font-size: 18px;
        z-index: 999;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .cart-badge {
        background: white;
        color: black;
        border-radius: 50%;
        padding: 2px 8px;
        font-size: 14px;
      }

      /* 🔥 TOAST */
      #toast {
        position: fixed;
        bottom: 80px;
        right: 20px;
        background: green;
        color: white;
        padding: 10px 15px;
        border-radius: 6px;
        display: none;
        z-index: 1000;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar d-flex justify-content-between align-items-center">
      <h4>🍔 LOCAL</h4>
      <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <a href="/">🏠 Home</a>
      <a href="/profile">👤 Profile</a>
      <a href="/orders">📦 Orders</a>
      <a href="/cart">🛒 Cart</a>

      {% if session.get('user_id') %}
      <a href="/logout">🚪 Logout</a>
      {% else %}
      <a href="/login">🔑 Login</a>
      <a href="/signup">📝 Signup</a>
      {% endif %}
    </div>

    <!-- MAIN -->
    <div class="container mt-4">{% block content %}{% endblock %}</div>

    <!-- FLOATING CART -->
    <a href="/cart" class="cart-float">
      🛒 <span class="cart-badge">{{ cart_count }}</span>
    </a>

    <!-- TOAST -->
    <div id="toast">✅ Item added to cart</div>

    <script>
      function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
      }

      function showToast() {
        const toast = document.getElementById("toast");
        toast.style.display = "block";

        setTimeout(() => {
          toast.style.display = "none";
        }, 1500);
      }
    </script>
  </body>
</html>
