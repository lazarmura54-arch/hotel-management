<!doctype html>
<html>
  <head>
    <title>LOCAL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f6f8;
        font-family: "Segoe UI", sans-serif;
      }

      .navbar {
        background: linear-gradient(to right, #ff6a00, #ee0979);
      }

      .card {
        border-radius: 15px;
        overflow: hidden;
        border: none;
      }

      .card:hover {
        transform: translateY(-5px);
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15);
      }

      .btn-custom {
        background: #ff6a00;
        color: white;
        border-radius: 10px;
      }

      .btn-custom:hover {
        background: #e55b00;
      }

      .food-img {
        height: 200px;
        width: 100%;
        object-fit: cover; /* 🔥 FIXES EVERYTHING */
        border-top-left-radius: 10px;
        border-top-right-radius: 10px;
      }

      .rating {
        color: #ffc107;
        font-size: 14px;
      }

      .floating-cart {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #ff6a00;
        color: white;
        padding: 15px 20px;
        border-radius: 50px;
        font-weight: bold;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .floating-cart:hover {
        background: #e55b00;
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
      <!-- LOGO / HOME -->
      <a href="/" class="navbar-brand fw-bold">🍔 LOCAL</a>

      <!-- MOBILE TOGGLE -->
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navBar"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navBar">
        <!-- LEFT SIDE MENU -->
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a href="/" class="nav-link">🏠 Home</a>
          </li>

          {% if session.get('user') %}
          <li class="nav-item">
            <a href="/orders" class="nav-link">📦 Orders</a>
          </li>

          <li class="nav-item">
            <a href="/profile" class="nav-link">👤 Profile</a>
          </li>
          {% endif %}
        </ul>

        <!-- SEARCH -->
        <form action="/search" class="d-flex me-3">
          <input name="q" class="form-control" placeholder="Search food..." />
        </form>

        <!-- RIGHT SIDE -->
        <div class="d-flex align-items-center">
          {% if session.get('user') %}
          <span class="text-white me-3">👋 {{ session['user'] }}</span>
          <a href="/logout" class="btn btn-light btn-sm">Logout</a>
          {% else %}
          <a href="/login" class="btn btn-light btn-sm me-2">Login</a>
          <a href="/signup" class="btn btn-warning btn-sm">Signup</a>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container mt-4">{% block content %}{% endblock %}</div>

    <a href="/cart" class="floating-cart">
      🛒 {{ session.get('cart_count', 0) }}
    </a>
  </body>
</html>
