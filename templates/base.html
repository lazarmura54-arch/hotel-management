<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOCAL 🍔</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f5f5;
      }

      /* 🔥 NAVBAR */
      .navbar {
        background: linear-gradient(90deg, orange, pink);
        padding: 12px;
        color: white;
      }

      .menu-btn {
        font-size: 24px;
        cursor: pointer;
        border: 2px solid white;
        padding: 6px 10px;
        border-radius: 8px;
      }

      /* 🔥 SIDE MENU */
      .sidebar {
        position: fixed;
        top: 0;
        right: -250px;
        width: 250px;
        height: 100%;
        background: linear-gradient(orange, pink);
        padding: 20px;
        transition: 0.3s;
        z-index: 1000;
      }

      .sidebar a {
        display: block;
        color: white;
        margin: 15px 0;
        text-decoration: none;
        font-size: 18px;
      }

      .sidebar.active {
        right: 0;
      }

      /* 🔥 CARDS */
      .card {
        border-radius: 12px;
        overflow: hidden;
        padding: 8px;
        height: 100%;
        transition: 0.3s;
      }

      .card:hover {
        transform: scale(1.03);
      }

      .card img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 10px;
      }

      .card-body {
        padding: 8px;
      }

      .card h5 {
        font-size: 16px;
        margin-bottom: 5px;
      }

      .card h6 {
        font-size: 14px;
      }

      .btn-custom {
        background: orange;
        color: white;
        border: none;
      }

      /* 🔥 FLOATING CART */
      .cart-float {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: orange;
        color: white;
        padding: 12px 18px;
        border-radius: 50px;
        font-size: 18px;
        z-index: 999;
      }

      /* 🔥 MOBILE */
      @media (max-width: 576px) {
        .card img {
          height: 140px;
        }
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar d-flex justify-content-between align-items-center">
      <h4>🍔 LOCAL</h4>
      <div class="menu-btn" onclick="toggleMenu()">☰</div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="sidebar">
      <a href="/">🏠 Home</a>
      <a href="/profile">👤 Profile</a>
      <a href="/orders">📦 Orders</a>
      <a href="/cart">🛒 Cart</a>

      {% if session.get('user') %}
      <a href="/logout">🚪 Logout</a>
      {% else %}
      <a href="/login">🔑 Login</a>
      <a href="/signup">📝 Signup</a>
      {% endif %}
    </div>

    <div class="container mt-4">{% block content %}{% endblock %}</div>

    <!-- FLOAT CART -->
    <a href="/cart" class="cart-float">
      🛒 {{ session.get('cart_count', 0) }}
    </a>

    <script>
      function toggleMenu() {
        document.getElementById("sidebar").classList.toggle("active");
      }
    </script>
  </body>
</html>
