{% extends "base.html" %} {% block content %}

<h2 style="text-align: center">🚚 Delivery Details</h2>

<div style="width: 80%; margin: auto; display: flex; gap: 30px">
  <!-- FORM -->
  <div
    style="flex: 1; border: 1px solid #ddd; padding: 20px; border-radius: 10px"
  >
    <form method="POST">
      Name:
      <input
        type="text"
        name="fname"
        value="{{ user.name or '' }}"
        required
      /><br /><br />

      Mobile:
      <input
        type="text"
        name="mobile"
        value="{{ user.mobile or '' }}"
        required
      /><br /><br />

      Address:
      <textarea name="address" required>{{ user.address or '' }}</textarea
      ><br /><br />

      <button type="submit">Place Order</button>
    </form>
  </div>

  <!-- CART SUMMARY -->
  <div
    style="flex: 1; border: 1px solid #ddd; padding: 20px; border-radius: 10px"
  >
    <h3>🛒 Order Summary</h3>

    {% for item in cart_items %}
    <p>
      {{ item.menu_item.name }} x {{ item.quantity }}
      <span style="float: right">
        ₹{{ item.menu_item.price * item.quantity }}
      </span>
    </p>
    {% endfor %}

    <hr />

    <h4>Total: ₹{{ total }}</h4>
  </div>
</div>

{% endblock %}
