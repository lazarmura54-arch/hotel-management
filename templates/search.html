{% extends "base.html" %} {% block content %}
<h3>Search Results for "{{ query }}"</h3>

<div class="row">
  {% for item in items %}
  <div class="col-md-4">
    <div class="card p-3">
      <h5>{{ item.name }}</h5>
      <p>₹{{ item.price }}</p>
    </div>
  </div>
  {% endfor %}
</div>

{% endblock %}
