{% extends "base.html" %} {% block content %}

<h3 class="fw-bold mb-4">{{ hotel }} Menu</h3>

<div class="col-md-4">
  <div class="card shadow-sm">
    <img
      src="{{ url_for('static', filename='images/' + item.image) }}"
      style="height: 180px; object-fit: cover; border-radius: 15px 15px 0 0"
    />

    <div class="p-3">
      <h5>{{ item.name }}</h5>
      <p class="text-muted">₹{{ item.price }}</p>

      <a href="/add_to_cart/{{ item.id }}" class="btn btn-warning w-100">
        Add to Cart
      </a>
    </div>
  </div>
</div>

{% endblock %}
