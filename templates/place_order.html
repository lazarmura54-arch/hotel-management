{% extends "base.html" %} {% block content %}

<h3>📍 Delivery Address</h3>

<form method="POST">
  <div class="row">
    <div class="col-md-6 mb-2">
      <input
        name="street"
        class="form-control"
        placeholder="Street"
        value="{{ user.street or '' }}"
        required
      />
    </div>

    <div class="col-md-6 mb-2">
      <input
        name="village"
        class="form-control"
        placeholder="Village"
        value="{{ user.village or '' }}"
        required
      />
    </div>

    <div class="col-md-6 mb-2">
      <input
        name="city"
        class="form-control"
        placeholder="City"
        value="{{ user.city or '' }}"
        required
      />
    </div>

    <div class="col-md-6 mb-2">
      <input
        name="state"
        class="form-control"
        placeholder="State"
        value="{{ user.state or '' }}"
        required
      />
    </div>

    <div class="col-md-6 mb-2">
      <input
        name="pincode"
        class="form-control"
        placeholder="Pincode"
        value="{{ user.pincode or '' }}"
        required
      />
    </div>

    <div class="col-md-6 mb-2">
      <input
        name="mobile"
        class="form-control"
        placeholder="Mobile"
        value="{{ user.mobile or '' }}"
        required
      />
    </div>
  </div>

  <!-- PAYMENT -->
  <div class="mt-3">
    <label><strong>Payment Method:</strong></label
    ><br />
    <input type="radio" checked /> Cash on Delivery
  </div>

  <button class="btn btn-success mt-3">Place Order</button>
</form>

{% endblock %}
